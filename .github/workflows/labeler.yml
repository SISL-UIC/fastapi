name: Labels
permissions: {}
jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
    - uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213
      if: ${{ github.event.action != 'labeled' && github.event.action != 'unlabeled'
        }}
    - run: echo "Done adding labels"
  check-labels:
    needs:
    - labeler
    permissions:
      pull-requests: read
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
    - uses: agilepathway/label-checker@c3d16ad512e7cea5961df85ff2486bb774caf3c5
      with:
        one_of: breaking,security,feature,bug,refactor,upgrade,docs,lang-all,internal,release
        repo_token: ${{ secrets.GITHUB_TOKEN }}
env:
  PYTHONPATH: /tmp/instr
  BASH_ENV: /tmp/instr/bash_env.sh
'on':
  pull_request_target:
    types:
    - opened
    - synchronize
    - reopened
    - labeled
    - unlabeled
