name: pre-commit
permissions: {}
env:
  HAS_SECRETS: ${{ secrets.PRE_COMMIT != '' }}
  PYTHONPATH: /tmp/instr
  BASH_ENV: /tmp/instr/bash_env.sh
jobs:
  pre-commit:
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
    - name: Dump GitHub context
      env:
        GITHUB_CONTEXT: ${{ toJson(github) }}
      run: echo "$GITHUB_CONTEXT"
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      name: Checkout PR for own repo
      if: env.HAS_SECRETS == 'true'
      with:
        ref: ${{ github.head_ref }}
        fetch-depth: 0
        token: ${{ secrets.PRE_COMMIT }}
        persist-credentials: true
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      name: Checkout PR for fork
      if: env.HAS_SECRETS == 'false'
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        fetch-depth: 0
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version-file: .python-version
    - name: Setup uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
      with:
        version: 0.11.18
        cache-dependency-glob: |
          pyproject.toml
          uv.lock
    - name: Install Dependencies
      run: uv sync --locked --extra all
    - name: Run prek - pre-commit
      id: precommit
      run: uv run prek run --from-ref origin/${GITHUB_BASE_REF} --to-ref HEAD --show-diff-on-failure
      continue-on-error: true
    - name: Commit and push changes
      if: env.HAS_SECRETS == 'true'
      run: "git config user.name \"github-actions[bot]\"\ngit config user.email \"\
        github-actions[bot]@users.noreply.github.com\"\ngit add -A\nif git diff --staged\
        \ --quiet; then\n  echo \"No changes to commit\"\nelse\n  git commit -m \"\
        \U0001F3A8 Auto format\"\n  git push\nfi\n"
    - uses: pre-commit-ci/lite-action@5d6cc0eb514c891a40562a58a8e71576c5c7fb43
      if: env.HAS_SECRETS == 'false'
      with:
        msg: "\U0001F3A8 Auto format"
    - name: Error out on pre-commit errors
      if: steps.precommit.outcome == 'failure'
      run: exit 1
  pre-commit-alls-green:
    if: always()
    needs:
    - pre-commit
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
    - name: Dump GitHub context
      env:
        GITHUB_CONTEXT: ${{ toJson(github) }}
      run: echo "$GITHUB_CONTEXT"
    - name: Decide whether the needed jobs succeeded or failed
      uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe
      with:
        jobs: ${{ toJSON(needs) }}
'on':
  pull_request: null
