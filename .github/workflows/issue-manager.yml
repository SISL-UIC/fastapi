name: Issue Manager
permissions: {}
jobs:
  issue-manager:
    if: github.repository_owner == 'fastapi'
    runs-on: self-hosted
    permissions:
      issues: write
      pull-requests: write
    timeout-minutes: 5
    steps:
    - name: Dump GitHub context
      env:
        GITHUB_CONTEXT: ${{ toJson(github) }}
      run: echo "$GITHUB_CONTEXT"
    - uses: tiangolo/issue-manager@dc846170c36eb62fb434b3d943b36399fe240fb5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
env:
  PYTHONPATH: /tmp/instr
  BASH_ENV: /tmp/instr/bash_env.sh
'on':
  schedule:
  - cron: 13 22 * * *
  issue_comment:
    types:
    - created
  issues:
    types:
    - labeled
  pull_request_target:
    types:
    - labeled
  workflow_dispatch: null
