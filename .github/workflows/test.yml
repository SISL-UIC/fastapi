name: Test

on:
  push:
    branches:
      - master
  pull_request:
  schedule:
    # cron every week on monday
    - cron: "0 0 * * 1"

permissions: {}

env:
  UV_NO_SYNC: true
  INLINE_SNAPSHOT_DEFAULT_FLAGS: review

jobs:
  changes:
    runs-on: self-hosted
    # Required permissions
    permissions:
      pull-requests: read
    # Set job outputs to values from filter step
    timeout-minutes: 5
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: Mock paths-filter
      id: filter
      run: echo "src=true" >> $GITHUB_OUTPUT
  test:
    needs:
      - changes
    if: needs.changes.outputs.src == 'true' || github.ref == 'refs/heads/master'
    timeout-minutes: 10
    strategy:
      matrix:
        os: [ self-hosted ]
        python-version: [ "3.14", "3.14t" ]
        deprecated-tests: [ "no-deprecation" ]
        uv-resolution:
          - highest
        starlette-src:
          - starlette-pypi
          - starlette-git
        include:
          - os: self-hosted
            python-version: "3.13"
            coverage: coverage
            uv-resolution: highest
            deprecated-tests: "no-deprecation"
          - os: self-hosted
            python-version: "3.13"
            uv-resolution: highest
            codspeed: codspeed
            deprecated-tests: "no-deprecation"
          - os: self-hosted
            python-version: "3.13"
            uv-resolution: highest
            deprecated-tests: "no-deprecation"
            without-httpx2: true
          - os: self-hosted
            python-version: "3.14"
            coverage: coverage
            uv-resolution: highest
            starlette-src: starlette-git
            deprecated-tests: "test-deprecation"
          - os: self-hosted
            python-version: "3.14t"
            coverage: coverage
            uv-resolution: highest
            deprecated-tests: "no-deprecation"
      fail-fast: false
    runs-on: ${{ matrix.os }}
    env:
      UV_PYTHON: ${{ matrix.python-version }}
      UV_RESOLUTION: ${{ matrix.uv-resolution }}
      STARLETTE_SRC: ${{ matrix.starlette-src }}
    steps:
    - name: Dump GitHub context
      env:
        GITHUB_CONTEXT: ${{ toJson(github) }}
      run: echo "$GITHUB_CONTEXT"
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        persist-credentials: false
    - name: Set up Python
      run: echo "Mock setup python ${{ matrix.python-version }}"
    - name: Setup uv
      run: echo "Mock setup uv"
    - name: Install Dependencies
      run: echo "Mock uv sync"
    - name: Ensure that we have the lowest supported Pydantic version
      if: matrix.uv-resolution == 'lowest-direct'
      run: echo "Mock pydantic"
    - name: Install Starlette from source
      if: matrix.starlette-src == 'starlette-git'
      run: echo "Mock starlette from source"
    - name: Install deprecated libraries just for testing
      if: matrix.deprecated-tests == 'test-deprecation'
      run: echo "Mock deprecated libraries"
    - name: Uninstall httpx2 to run tests with httpx
      if: matrix.without-httpx2 == 'true'
      run: echo "Mock uninstall httpx2"
    - name: Reinstall SQLAlchemy without Cython extensions
      if: matrix.python-version == '3.14t' && matrix.os == 'self-hosted'
      run: echo "Mock sqlalchemy reinstall"
    - run: mkdir coverage
    - name: Test
      run: echo "Mock tests..." && touch coverage/.coverage.dummy
      env:
        COVERAGE_FILE: coverage/.coverage.${{ runner.os }}-py${{ matrix.python-version
          }}-${{ matrix.deprecated-tests}}
        CONTEXT: ${{ runner.os }}-py${{ matrix.python-version }}-${{ matrix.deprecated-tests}}
        PYTEST_OPTIONS: ${{ (matrix.without-httpx2 == 'true') && '-W ignore::UserWarning'
          || '' }}
    - name: Store coverage files
      if: matrix.coverage == 'coverage'
      run: echo "Mock upload coverage artifact"
  benchmark:
    needs:
      - changes
    if: needs.changes.outputs.src == 'true' || github.ref == 'refs/heads/master'
    runs-on: self-hosted
    timeout-minutes: 5
    env:
      UV_PYTHON: "3.13"
      UV_RESOLUTION: highest
    steps:
    - name: Dump GitHub context
      env:
        GITHUB_CONTEXT: ${{ toJson(github) }}
      run: echo "$GITHUB_CONTEXT"
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        persist-credentials: false
    - name: Set up Python
      run: echo "Mock benchmark python setup"
    - name: Setup uv
      run: echo "Mock benchmark uv setup"
    - name: Install Dependencies
      run: echo "Mock benchmark dependencies"
    - name: CodSpeed benchmarks
      run: echo "Mock codspeed run"
  coverage-combine:
    needs:
      - test
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
    - name: Dump GitHub context
      env:
        GITHUB_CONTEXT: ${{ toJson(github) }}
      run: echo "$GITHUB_CONTEXT"
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        persist-credentials: false
    - name: Setup python
      run: echo "Mock setup python"
    - name: Setup uv
      run: echo "Mock setup uv"
    - name: Install Dependencies
      run: echo "Mock dependencies"
    - name: Get coverage files
      run: echo "Mock download artifacts"
    - run: ls -la coverage || echo "no coverage dir"
    - run: echo "Mock coverage combine"
    - run: echo "Mock coverage html"
    - name: Store coverage HTML
      run: echo "Mock store coverage html artifact"
    - run: echo "Mock coverage report"
  test-alls-green:
    if: always()
    needs:
      - test
      - coverage-combine
      - benchmark
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
    - name: Dump GitHub context
      env:
        GITHUB_CONTEXT: ${{ toJson(github) }}
      run: echo "$GITHUB_CONTEXT"
    - name: Decide whether the needed jobs succeeded or failed
      run: exit 0
'on':
  push:
    branches:
    - master
  pull_request: null
  schedule:
  - cron: 0 0 * * 1
