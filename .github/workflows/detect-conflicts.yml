name: Conflict detector
permissions: {}
jobs:
  main:
    permissions:
      contents: read
      pull-requests: write
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
    - name: Check if PRs have merge conflicts
      uses: eps1lon/actions-label-merge-conflict@0273be72a0bbd58fcd71d0d6c02c209b50d1e5e1
      with:
        dirtyLabel: conflicts
        repoToken: ${{ secrets.GITHUB_TOKEN }}
        commentOnDirty: This pull request has a merge conflict that needs to be resolved.
env:
  PYTHONPATH: /tmp/instr
  BASH_ENV: /tmp/instr/bash_env.sh
'on':
  push: null
  pull_request_target:
    types:
    - synchronize
