name: Notify Translations
permissions: {}
jobs:
  job:
    runs-on: self-hosted
    permissions:
      discussions: write
    timeout-minutes: 5
    steps:
    - name: Dump GitHub context
      env:
        GITHUB_CONTEXT: ${{ toJson(github) }}
      run: echo "$GITHUB_CONTEXT"
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        ref: ${{ github.event.repository.default_branch }}
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version-file: .python-version
    - name: Setup uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
      with:
        version: 0.11.18
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock
    - name: Install Dependencies
      run: uv sync --locked --no-dev --group github-actions
    - name: Setup tmate session
      uses: mxschmitt/action-tmate@35b54afac29c97fb54faba5b513f8fbd1882f113
      if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug_enabled
        == 'true' }}
      with:
        limit-access-to-actor: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Notify Translations
      run: uv run ./scripts/notify_translations.py
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NUMBER: ${{ github.event.inputs.number || null }}
        DEBUG: ${{ github.event.inputs.debug_enabled || 'false' }}
env:
  PYTHONPATH: /tmp/instr
  BASH_ENV: /tmp/instr/bash_env.sh
'on':
  pull_request_target:
    types:
    - labeled
    - closed
    branches:
    - master
  workflow_dispatch:
    inputs:
      number:
        description: PR number
        required: true
      debug_enabled:
        description: Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)
        required: false
        default: 'false'
